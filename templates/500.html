{% extends "base.html" %}
{% load static %}

{% block title %}
<title>Ошибка сервера</title>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/error.css' %}">
{% endblock %}

{% block content %}
<div class="error-page text-center py-5">
    <div class="container">
        <div class="error-code">500</div>
        <h1 class="error-title">Ошибка сервера</h1>
        <p class="error-text">Извините, на сервере произошла ошибка. Мы уже работаем над её устранением.</p>
        <a href="{% url 'main:index' %}" class="btn btn-primary">
            <i class="fas fa-home"></i> Вернуться на главную
        </a>
    </div>
</div>
{% endblock %}
